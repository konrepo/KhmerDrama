<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KhmerDub Addon</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="overlay">
    <div class="content">

  <img src="bg/logo.png" class="logo" alt="KhmerDub Logo" />

  <h1>ខ្មែរ</h1>      
  <h2>KhmerDub</h2>
<p class="label">
  ☕ <a href="https://ko-fi.com/thedevilz" target="_blank" rel="noopener noreferrer">Support Me</a>
</p>
      
  <p class="subtitle">
    Stream Asian dramas dubbed in Khmer | By: TheDevilz
  </p>

  <!-- Stremio -->
  <p class="label">
     <a href="https://www.stremio.com/" target="_blank">👉 For Stremio App</a>
  </p>
  <a class="btn stremio"
     href="stremio://khmerhub.onrender.com/khmerdub/manifest.json"
     onclick="setTimeout(() => window.location.href='https://khmerhub.onrender.com/khmerdub/manifest.json', 1500)">
    <img src="bg/stremio.png" class="icon" alt="Stremio">
    Install on Stremio
  </a>

  <!-- Nuvio -->
  <p class="label">
     <a href="https://nuvioapp.space/" target="_blank">👉 For Nuvio App</a>
  </p>
  <a class="btn nuvio"
     href="https://khmerhub.onrender.com/khmernuv/manifest.json"
     target="_blank">
    <img src="bg/nuvio.png" class="icon" alt="Nuvio">
    Install on Nuvio
  </a>

  <!-- Kodi -->
  <p class="label">
     <a href="https://kodi.tv/download/" target="_blank">👉 For Kodi App</a>
  </p>
  <a class="btn kodi"
     href="https://konrepo.github.io/KhmerKodi"
     target="_blank">
    <img src="bg/kodi.png" class="icon" alt="Kodi">
    Install on Kodi
  </a>      

</div>

  </div>
</body>
</html>
